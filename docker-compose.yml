services:
  bot:
    build: .
    container_name: taskbot_bot
    restart: unless-stopped
    command: python main.py
    env_file: .env
    environment:
      DB_PATH: /app/data/tasks.db
    volumes:
      - ./data:/app/data
    depends_on:
      - web
    networks: [taskbot_net]

  web:
    build: .
    container_name: taskbot_web
    restart: unless-stopped
    command: python -m flask --app web.main run --host=0.0.0.0 --port=8000
    env_file: .env
    environment:
      DB_PATH: /app/data/tasks.db
    volumes:
      - ./data:/app/data
    ports:
      - "8000:8000"
    networks: [taskbot_net]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  taskbot_net:
    driver: bridge
