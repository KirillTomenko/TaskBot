version: "3.9"

services:
  bot:
    build: .
    container_name: taskbot_bot
    command: python main.py
    env_file: .env
    volumes:
      - taskbot_data:/app/data
    restart: unless-stopped

  web:
    build: .
    container_name: taskbot_web
    command: python web/main.py
    env_file: .env
    volumes:
      - taskbot_data:/app/data
    ports:
      - "5000:5000"
    restart: unless-stopped

volumes:
  taskbot_data: